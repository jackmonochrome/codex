name: Build macOS App Mic Fix

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build LaptopSlap with microphone fix
        run: |
          xcodebuild \
            -project LaptopSlap.xcodeproj \
            -scheme LaptopSlap \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ENABLE_APP_SANDBOX=NO \
            build

      - name: Package app bundle
        run: |
          mkdir -p build/artifacts
          ditto -c -k --sequesterRsrc --keepParent \
            build/DerivedData/Build/Products/Release/LaptopSlap.app \
            build/artifacts/LaptopSlap.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: LaptopSlap-macOS-app-micfix
          path: build/artifacts/LaptopSlap.app.zip
          if-no-files-found: error
